<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>resume-build-chopper</title>
  <style>
    :root {
      --bg: #0f1115; --fg: #e8ecf3; --muted: #8a93a6; --accent: #7aa2ff;
      --surface: #171a21; --border: #232734;
    }
    body { background: var(--bg); color: var(--fg); font-family: ui-sans-serif, system-ui;
           margin: 0; padding: 2rem; }
    main { max-width: 720px; margin: 0 auto; }
    h1 { font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    p.sub { color: var(--muted); margin-top: 0; }
    form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
           padding: 1.5rem; display: grid; gap: 1rem; }
    label { display: grid; gap: 0.35rem; font-size: 0.9rem; }
    input, select, textarea { background: #0c0e13; color: var(--fg); border: 1px solid var(--border);
                              padding: 0.6rem 0.75rem; border-radius: 8px; font: inherit; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    button { background: var(--accent); color: #0a0d14; font-weight: 600;
             border: 0; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    .hint { color: var(--muted); font-size: 0.8rem; }
    .modeToggle { display: flex; gap: 0.5rem; }
    .modeToggle label { flex: 1; background: #0c0e13; border: 1px solid var(--border);
                        padding: 0.6rem; border-radius: 8px; cursor: pointer; text-align: center; }
    .modeToggle input { display: none; }
    .modeToggle input:checked + span { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
<main>
  <h1>resume-build-chopper</h1>
  <p class="sub">Mine your GitHub for a role-targeted resume. AI or fully static.</p>

  <form action="/build" method="post" enctype="multipart/form-data">
    <div class="modeToggle">
      <label><input type="radio" name="mode" value="static" checked><span>Static</span></label>
      <label><input type="radio" name="mode" value="ai"><span>AI</span></label>
    </div>

    <label>GitHub username
      <input name="gh_user" required placeholder="e.g. octocat">
    </label>

    <div class="row">
      <label>Role (static)
        <select name="role">
          <option value="">— choose —</option>
          {% for r in roles %}
          <option value="{{ r.id }}">{{ r.label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Role prompt (AI)
        <input name="role_prompt" placeholder="e.g. cybersecurity blue team / SOC analyst">
      </label>
    </div>

    <label>Resume document (PDF / DOCX / TEX) — optional
      <input type="file" name="docs" accept=".pdf,.docx,.tex,.md,.txt">
    </label>

    <label>Output formats
      <input name="formats" value="latex,md,json,pdf">
      <span class="hint">Comma-separated. Choices: latex, md, json, pdf.</span>
    </label>

    <button type="submit">Build resume</button>
  </form>
</main>
</body>
</html>
